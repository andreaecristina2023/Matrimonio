<!DOCTYPE html>
<html lang="it">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Andrea e Cristina 04.06.2026</title>

<link rel="icon" type="image/png" href="https://raw.githubusercontent.com/andreaecristina2023/Matrimonio/main/images/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Kaushan+Script&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { font-family:'Kaushan Script', cursive; width:100%; height:100%; overflow-x:hidden; }
body::before {
    content:""; position:fixed; inset:0;
    background:linear-gradient(rgba(0,0,0,0.35),rgba(0,0,0,0.35)), url('https://raw.githubusercontent.com/andreaecristina2023/Matrimonio/main/images/background.jpg') center/cover no-repeat;
    z-index:-1;
}

.central-wrapper {
    display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;
    width:100%; min-height:90vh; padding-top:5vh;
}
.central-container { width:100%; display:flex; justify-content:center; }
#map { width:90%; max-width:1000px; height:70vh; border-radius:15px; overflow:hidden; }

nav .menu a, .mobile-menu a {
    color: rgba(255,255,255,0.85); text-decoration:none; border-bottom:2px solid transparent; transition:all 0.3s;
}
nav .menu a:hover:not(.active), .mobile-menu a:hover:not(.active) { border-bottom:2px solid #ff0000; }
nav .menu a.active, .mobile-menu a.active { color:#ff0000; font-weight:bold; }

.marker-number div, .marker-special div, .marker-municipio div {
    display:flex; align-items:center; justify-content:center; border-radius:50%; width:100%; height:100%;
    text-align:center; font-size:2em; color:white; font-family:'Kaushan Script', cursive;
}
.marker-number div { background:#8e24aa; }
.marker-special div { background:#ff0000; }
.marker-municipio div { background:#4caf50; }

.leaflet-popup-content { font-family:'Kaushan Script', cursive !important; font-size:1.1rem; text-align:left; min-width:220px; }
.leaflet-popup-content a { color:#0000ff; text-decoration:none; font-weight:bold; }
.leaflet-popup-content a:hover { text-decoration:underline; }
.leaflet-popup-content-wrapper { background:white; border-radius:15px; box-shadow:0 6px 18px rgba(0,0,0,0.25); }
.leaflet-popup-tip { background:white; }

.info.legend {
    font-family:'Kaushan Script', cursive;
    background:white;
    padding:12px;
    border-radius:10px;
    text-align:left;
    font-size:1rem;
    box-shadow:0 6px 18px rgba(0,0,0,0.2);
}
.info.legend b { display:block; margin-bottom:6px; }
.info.legend div { margin-bottom:4px; }

.legend-toggle {
    display:none;
    font-family:'Kaushan Script', cursive;
    font-size:1rem;
    background:#ff0000;
    color:white;
    border:none;
    border-radius:5px;
    padding:5px 10px;
    cursor:pointer;
    margin-bottom:5px;
}

@media(max-width:768px){
    .legend-toggle { display:block; background:#ff0000; color:white;}
    .info.legend { display:none; position:absolute; top:50px; right:10px; z-index:1000; }
    .info.legend.show { display:block; }
}

/* Popup wrapper */
.leaflet-popup-content-wrapper {
    /*background: transparent !important;   /* rimuove il bianco */
    /*box-shadow: none !important;          /* rimuove ombra */
    /*padding: 0 !important;              /* rimuove padding predefinito */
    /*border: 0 !important;               /* bordo zero */
    /*border: none !important;              /* rimuove bordo */
}

/* Punta del popup */
.leaflet-popup-tip {
    /*background: transparent !important;  /* rimuove punta */
}

/* Contenuto del popup */
.leaflet-popup-content {
    font-family:'Kaushan Script', cursive !important;
    font-size:1.1rem;
    text-align:left;
    min-width:220px;
    padding:0;  /* rimuove padding predefinito */
}

/* Responsive mobile */
@media(max-width:600px){
    .leaflet-popup-content {
        font-size:1rem !important;
    }

    .leaflet-popup-content div {
        font-size:16px !important;
    }

    .leaflet-popup-content a[target="_blank"] {
        padding:5px 8px !important;
        font-size:14px !important;
    }
}
</style>
</head>

<body>

<div id="menu-placeholder"></div>
<div class="central-wrapper" id="centralWrapper">
    <div class="central-container">
        <div id="map"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
console.log("🚀 Inizio script mappa");

// ===== CARICA MENU =====
fetch('menu.html')
.then(resp=>resp.text())
.then(html=>{
    document.getElementById('menu-placeholder').innerHTML = html;
    const menuTitle = document.getElementById('menuPageTitle');
    if(menuTitle) menuTitle.textContent = "Mappa dei consigli";

    const hamburger = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobileMenu');
    if(hamburger && mobileMenu){
        hamburger.addEventListener('click', ()=>mobileMenu.style.display = mobileMenu.style.display==='flex'?'none':'flex');
        mobileMenu.querySelectorAll('a').forEach(link=>link.addEventListener('click',()=>mobileMenu.style.display='none'));
        window.addEventListener('resize', ()=>{if(window.innerWidth>768) mobileMenu.style.display='none';});
    }

    const currentPage = location.pathname.split("/").pop() || 'homepage.html';
    document.querySelectorAll('nav .menu a, nav .mobile-menu a').forEach(link=>{
        if(link.getAttribute('href')===currentPage) link.classList.add('active');
    });

    updateCentralPosition();
    window.addEventListener('resize', updateCentralPosition);
})
.catch(err=>console.warn('❌ Errore caricamento menu:',err));

// ===== Centra wrapper verticale =====
function updateCentralPosition(){
    const nav = document.querySelector('nav');
    const wrapper = document.getElementById('centralWrapper');
    const menuTitle = document.getElementById('menuPageTitle');
    if(nav){
        const totalHeight = 2*nav.offsetHeight + (menuTitle?menuTitle.offsetHeight:0);
        const availableHeight = window.innerHeight - totalHeight;
        wrapper.style.height = `${availableHeight}px`;
        wrapper.style.paddingTop = `${availableHeight*0.35}px`;
        wrapper.style.visibility = 'visible';
    }
}

// ===== MAPPA =====
const CENTRO = {lat:44.15058, lon:12.141665};
const map = L.map('map', {zoomControl:false}).setView([CENTRO.lat,CENTRO.lon],13);
L.control.zoom({position:'bottomleft'}).addTo(map);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

const csvURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQBV9faZqgv88uu4_Z790474hIu-ik9XnOOQckWEWuPeMKSQ26VQrXwGCBeFn-WLRb7nbU0sd1pqkBg/pub?gid=279539594&single=true&output=csv";

// ===== UTILITY =====
function parseCSVtoObjects(text) {
    text = text.replace(/^\uFEFF/, '');
    const lines = text.split(/\r?\n/).filter(l => l.trim() !== '');
    function splitCSV(line) {
        const result = [], n = line.length;
        let current = "", insideQuotes = false;
        for (let i=0;i<n;i++){
            const char=line[i], next=line[i+1];
            if(char==='"' && insideQuotes && next==='"'){ current+='"'; i++; }
            else if(char==='"'){ insideQuotes=!insideQuotes; }
            else if(char===',' && !insideQuotes){ result.push(current.trim()); current=""; }
            else { current+=char; }
        }
        result.push(current.trim());
        return result;
    }
    const header = splitCSV(lines[0]).map(h=>h.trim());
    return lines.slice(1).map(line=>{
        const cols = splitCSV(line), obj={};
        header.forEach((h,i)=>{ obj[h]=(cols[i]||"").trim(); });
        return obj;
    });
}

function getIconSize(){ return Math.round(Math.min(window.innerWidth,window.innerHeight)*0.06); }
function getFontSize(size){ return Math.round(size*0.45); }

function createCustomIcon(symbol,color="#ff0000"){
    const size = getIconSize(), fontSize = getFontSize(size);
    return L.divIcon({
        className:'marker-special',
        html:`<div style="font-family:'Kaushan Script', cursive;font-size:${fontSize}px;background:${color};border-radius:50%;width:${size}px;height:${size}px;display:flex;align-items:center;justify-content:center;color:white;">${symbol}</div>`,
        iconSize:[size,size], iconAnchor:[size/2,size/2], popupAnchor:[0,-size/2]
    });
}

function createNumberIcon(symbol,color="#2196f3"){
    const size = getIconSize(), fontSize = getFontSize(size);
    return L.divIcon({
        className:'marker-number',
        html:`<div style="font-family:'Kaushan Script', cursive;font-size:${fontSize}px;background:${color};border-radius:50%;width:${size}px;height:${size}px;display:flex;align-items:center;justify-content:center;color:white;">${symbol}</div>`,
        iconSize:[size,size], iconAnchor:[size/2,size/2], popupAnchor:[0,-size/2]
    });
}

// ===== CARICAMENTO MARKER + LEGENDA =====
const allMarkers=[];
fetch(csvURL).then(r=>r.text()).then(text=>{
    const points=parseCSVtoObjects(text);
    points.forEach(p=>{
        const lat=parseFloat(p.Latitudine), lon=parseFloat(p.Longitudine);
        if(isNaN(lat) || isNaN(lon)) return;

        const color=(p.Colore||"#ff0000").trim();
        const markerIcon = (p.Categoria==="Parcheggi") ? createNumberIcon(p.Simbolo,color) : createCustomIcon(p.Simbolo,color);

const descriptionBg = (color.toLowerCase() === "#d81b60") ? "white" : color;
const popupBackground = `${color}33`;  // stesso colore dello sfondo leggero

const popupHTML = `
<div style="
    line-height:1.4;
    background:${popupBackground};  /* sfondo popup leggero */
    padding:8px;
    /*border-radius:8px;*/
">
    <div style="
        background:${descriptionBg};      /* riquadro Descrizione */
        color:#ff0000;                    /* testo Descrizione rosso */
        font-size:18px;
        font-weight:bold;
        padding:6px 10px;
        border-radius:6px;
        margin-bottom:6px;
        text-align:center;
        width:100%;
        box-sizing:border-box;
        box-shadow:0 2px 6px rgba(0,0,0,0.25);
    ">
        ${p.Descrizione}
    </div>
    ${p.Indirizzo?`📍 Indirizzo: ${p.Indirizzo}<br>`:""}
    ${p.Telefono?`📞 Telefono: <a href="tel:${p.Telefono}">${p.Telefono}</a><br>`:""}
    ${p["Posti auto"]?`🅿️ Posti: ${p["Posti auto"]}<br>`:""}
    ${p.Accessibilità?`♿ Accessibilità: ${p.Accessibilità}<br>`:""}
    ${p.Distanza?`📏 Distanza: ${p.Distanza}<br>`:""}
    ${p["Lunghezza percorso dal Comune"]?`📐 Lunghezza percorso: ${p["Lunghezza percorso dal Comune"]}<br>`:""}
    ${p.Dislivello?`⛰️ Dislivello: ${p.Dislivello}<br>`:""}
    ${p.Note?`📝 Note: ${p.Note}<br>`:""}
    <div style="
        display:flex;
        justify-content:center;
        margin-top:6px;
    ">
        <a href="https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}" target="_blank" style="
            background:white;           /* pulsante bianco */
            color:${color};
            padding:6px 12px;
            border-radius:5px;
            font-weight:bold;
            text-decoration:none;
            box-shadow:0 1px 4px rgba(0,0,0,0.2);
        ">🚗 Naviga 🚗</a>
    </div>
</div>
`;

        const marker=L.marker([lat,lon],{icon:markerIcon});
        marker.category=p.Categoria||"Altro";
        marker.bindPopup(popupHTML).addTo(map);
        allMarkers.push(marker);
    });

    // ===== LEGENDA =====
    const categories=["Luoghi principali","Parcheggi","Enoteche","Ristoranti","Monumenti","Altro"];
    const legendControl=L.control({position:'topright'});
    legendControl.onAdd=function(map){
        const wrapper=L.DomUtil.create('div');
        const toggle=L.DomUtil.create('button','legend-toggle', wrapper);
        toggle.innerHTML='☰ Legenda';
        const legendDiv=L.DomUtil.create('div','info legend', wrapper);
        legendDiv.innerHTML="<b>Legenda</b>"; legendDiv.querySelector('b').style.marginBottom='6px';

        categories.forEach(cat=>{
            const id="chk_"+cat.replace(/\s/g,''), isChecked=(cat==="Luoghi principali"||cat==="Parcheggi");
            const row=document.createElement('div'); row.style.marginTop='4px';
            row.innerHTML=`<input type="checkbox" id="${id}" ${isChecked?"checked":""}><label for="${id}"> ${cat}</label>`;
            legendDiv.appendChild(row);
            allMarkers.forEach(m=>{if(m.category===cat && !isChecked) map.removeLayer(m);});
            row.querySelector('input').addEventListener('change',e=>{
                allMarkers.forEach(m=>{ if(m.category===cat){ e.target.checked? m.addTo(map) : map.removeLayer(m); }});
            });
        });

        toggle.addEventListener('click',()=>{legendDiv.classList.toggle('show');});
        return wrapper;
    };
    legendControl.addTo(map);
});

// ===== RIDIMENSIONAMENTO DINAMICO =====
function resizeMarkers(){
    allMarkers.forEach(m=>{
        const oldHTML=m.options.icon.options.html;
        const symbolMatch=oldHTML.match(/>(.*?)<\/div>/);
        if(!symbolMatch) return;
        const symbol=symbolMatch[1];
        const colorMatch=oldHTML.match(/background:(.*?);/);
        const color=colorMatch?colorMatch[1]:"#ff0000";
        if(m.category==="Parcheggi") m.setIcon(createNumberIcon(symbol,color));
        else m.setIcon(createCustomIcon(symbol,color));
    });
}
window.addEventListener('resize',resizeMarkers);

// ===== LOCALIZZAZIONE UTENTE =====
function locateUser(){ map.locate({setView:true,maxZoom:16}); }
map.on('locationfound', e=>{ L.marker(e.latlng).addTo(map).bindPopup("Sei qui").openPopup(); });

</script>
</body>
</html>
