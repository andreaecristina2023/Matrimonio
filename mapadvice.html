<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andrea e Cristina 04.06.2026</title>

    <link rel="icon" type="image/png"
        href="https://raw.githubusercontent.com/andreaecristina2023/Matrimonio/main/images/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Kaushan+Script&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            font-family: 'Kaushan Script', cursive;
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: linear-gradient(rgba(0, 0, 0, 0.35), rgba(0, 0, 0, 0.35)), url('https://raw.githubusercontent.com/andreaecristina2023/Matrimonio/main/images/background.jpg') center/cover no-repeat;
            z-index: -1;
        }

        .central-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            width: 100%;
            min-height: 90vh;
            padding-top: 5vh;
        }

        .central-container {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        #map {
            width: 90%;
            max-width: 1000px;
            height: 70vh;
            border-radius: 15px;
            overflow: hidden;
        }

        nav .menu a,
        .mobile-menu a {
            color: rgba(255, 255, 255, 0.85);
            text-decoration: none;
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
        }

        nav .menu a:hover:not(.active),
        .mobile-menu a:hover:not(.active) {
            border-bottom: 2px solid #ff0000;
        }

        nav .menu a.active,
        .mobile-menu a.active {
            color: #ff0000;
            font-weight: bold;
        }

        .marker-number div,
        .marker-special div,
        .marker-municipio div {
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            width: 100%;
            height: 100%;
            text-align: center;
            font-size: 2em;
            color: white;
        }

        .marker-number div {
            background: #8e24aa;
        }

        .marker-special div {
            background: #ff0000;
        }

        .marker-municipio div {
            background: #4caf50;
        }

        .leaflet-popup-content {
            font-family: 'Kaushan Script', cursive !important;
            font-size: 1.1rem;
            text-align: left;
        }

        .leaflet-popup-content b {
            color: #ff0000;
            font-weight: bold;
        }

        .leaflet-popup-content a {
            color: #0000ff;
            text-decoration: none;
            font-weight: bold;
        }

        .leaflet-popup-content a:hover {
            text-decoration: underline;
        }

        .leaflet-popup-content-wrapper {
            background: white;
            border-radius: 15px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.25);
        }

        .leaflet-popup-tip {
            background: white;
        }
    </style>
</head>

<body>

    <div id="menu-placeholder"></div>
    <div class="central-wrapper" id="centralWrapper">
        <div class="central-container">
            <div id="map"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        console.log("🚀 Inizio script mappa");

        // ===== CARICA MENU =====
        fetch('menu.html')
            .then(resp => resp.text())
            .then(html => {
                document.getElementById('menu-placeholder').innerHTML = html;
                console.log("✅ Menu caricato");
                const menuTitle = document.getElementById('menuPageTitle');
                if (menuTitle) menuTitle.textContent = "Mappa dei consigli";

                const hamburger = document.getElementById('hamburger');
                const mobileMenu = document.getElementById('mobileMenu');
                if (hamburger && mobileMenu) {
                    hamburger.addEventListener('click', () => mobileMenu.style.display = mobileMenu.style.display === 'flex' ? 'none' : 'flex');
                    mobileMenu.querySelectorAll('a').forEach(link => link.addEventListener('click', () => mobileMenu.style.display = 'none'));
                    window.addEventListener('resize', () => { if (window.innerWidth > 768) mobileMenu.style.display = 'none'; });
                }

                const currentPage = location.pathname.split("/").pop() || 'homepage.html';
                document.querySelectorAll('nav .menu a, nav .mobile-menu a').forEach(link => {
                    if (link.getAttribute('href') === currentPage) link.classList.add('active');
                });

                updateCentralPosition();
                window.addEventListener('resize', updateCentralPosition);
            })
            .catch(err => console.warn('❌ Errore caricamento menu:', err));

        // ===== Centra wrapper verticale =====
        function updateCentralPosition() {
            const nav = document.querySelector('nav');
            const wrapper = document.getElementById('centralWrapper');
            const menuTitle = document.getElementById('menuPageTitle');
            if (nav) {
                const totalHeight = 2 * nav.offsetHeight + (menuTitle ? menuTitle.offsetHeight : 0);
                const availableHeight = window.innerHeight - totalHeight;
                wrapper.style.height = `${availableHeight}px`;
                wrapper.style.paddingTop = `${availableHeight * 0.35}px`;
                wrapper.style.visibility = 'visible';
            }
        }

        // ===== MAPPA =====
        const CENTRO = { lat: 44.15058, lon: 12.141665 };
        const map = L.map('map', { zoomControl: false }).setView([CENTRO.lat, CENTRO.lon], 13);
        L.control.zoom({ position: 'bottomleft' }).addTo(map);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        const csvURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQBV9faZqgv88uu4_Z790474hIu-ik9XnOOQckWEWuPeMKSQ26VQrXwGCBeFn-WLRb7nbU0sd1pqkBg/pub?gid=279539594&single=true&output=csv";

        // ===== UTILITY =====
        function parseCSVtoObjects(text) {
            const lines = text.trim().split("\n");

            // Funzione che splitta rispettando le virgolette
            function splitCSV(line) {
                const result = [];
                let current = '';
                let insideQuotes = false;

                for (let i = 0; i < line.length; i++) {
                    const char = line[i];

                    if (char === '"') {
                        insideQuotes = !insideQuotes;
                    } else if (char === ',' && !insideQuotes) {
                        result.push(current.trim());
                        current = '';
                    } else {
                        current += char;
                    }
                }
                result.push(current.trim());
                return result;
            }

            const header = splitCSV(lines[0]);

            return lines.slice(1).map(line => {
                const cols = splitCSV(line);
                let obj = {};
                header.forEach((h, i) => {
                    obj[h] = cols[i] ? cols[i].replace(/^"|"$/g, '') : '';
                });
                return obj;
            });
        }

        function getIconSize() { return Math.round(Math.min(window.innerWidth, window.innerHeight) * 0.06); }
        function getFontSize(size) { return Math.round(size * 0.45); }

        function createCustomIcon(symbol, color = "#ff0000") {
            const size = getIconSize();
            const fontSize = getFontSize(size);
            return L.divIcon({
                className: 'marker-special',
                html: `<div style="font-size:${fontSize}px; background:${color}; border-radius:50%; width:${size}px; height:${size}px; display:flex; align-items:center; justify-content:center;">${symbol}</div>`,
                iconSize: [size, size],
                iconAnchor: [size / 2, size / 2],
                popupAnchor: [0, -size / 2]
            });
        }

        function createNumberIcon(text) {
            const size = getIconSize();
            const fontSize = getFontSize(size);
            return L.divIcon({
                className: 'marker-number',
                html: `<div style="font-size:${fontSize}px;">${text}</div>`,
                iconSize: [size, size],
                iconAnchor: [size / 2, size / 2],
                popupAnchor: [0, -size / 2]
            });
        }

        // ===== CARICAMENTO MARKER =====
        const allMarkers = [];

        // Punti CSV
        fetch(csvURL)
            .then(r => r.text())
            .then(text => {
                const points = parseCSVtoObjects(text);
                console.log(points);
                points.forEach(p => {
                    const lat = parseFloat(p.Latitudine);
                    const lon = parseFloat(p.Longitudine);
                    if (!isNaN(lat) && !isNaN(lon)) {
                        const popupHTML = `
                            <span style="color:#ff0000;">${p.Categoria}:</span> <b>${p.Descrizione}</b><br>
                            ${p.Indirizzo ? `<span style="color:#ff0000;">Indirizzo:</span> <b>${p.Indirizzo}</b><br>` : ""}
                            ${p.Telefono ? `<span style="color:#ff0000;">Telefono:</span> <b><a href="tel:${p.Telefono}">${p.Telefono}</a></b><br>` : ""}
                            ${p["Posti auto"] ? `<span style="color:#ff0000;">Posti auto:</span> <b>${p["Posti auto"]}</b><br>` : ""}
                            ${p.Accessibilità ? `<span style="color:#ff0000;">Accessibilità:</span> <b>${p.Accessibilità}</b><br>` : ""}
                            ${p.Distanza ? `<span style="color:#ff0000;">Distanza dal Comune:</span> <b>${p.Distanza}</b><br>` : ""}
                            ${p["Lunghezza percorso dal Comune"] ? `<span style="color:#ff0000;">Lunghezza percorso:</span> <b>${p["Lunghezza percorso dal Comune"]}</b><br>` : ""}
                            ${p.Dislivello ? `<span style="color:#ff0000;">Dislivello:</span> <b>${p.Dislivello}</b><br>` : ""}
                            ${p.Note ? `<span style="color:#ff0000;">Note:</span> <b>${p.Note}</b><br>` : ""}
                            <br>
                            <a href="https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}" target="_blank">🚗 Naviga</a>
                        `;

                        // Se il simbolo inizia con "P" o è un numero → NumberIcon
                        let markerIcon;
                        if (/^P\d+/i.test(p.Simbolo) || /^\d+$/.test(p.Simbolo)) {
                            markerIcon = createNumberIcon(p.Simbolo);
                        } else {
                            markerIcon = createCustomIcon(p.Simbolo, p.Colore);
                        }

                        const marker = L.marker([lat, lon], { icon: markerIcon });
                        marker.category = p.Categoria || "Altro";
                        marker.bindPopup(popupHTML).addTo(map);
                        allMarkers.push(marker);
                    }
                });
                console.log("✅ Punti CSV caricati!");
            });

        // ===== LEGENDA =====
        const legend = L.control({ position: 'topright' });

        legend.onAdd = function () {
            const div = L.DomUtil.create('div', 'info legend');
            div.style.background = 'white';
            div.style.padding = '12px';
            div.style.borderRadius = '10px';
            div.style.fontFamily = "'Kaushan Script', cursive";
            div.innerHTML = "<b>Filtra categorie</b><br><br>";

            return div;
        };

        legend.addTo(map);

        // ===== RIDIMENSIONAMENTO DINAMICO =====
        function resizeMarkers() {
            allMarkers.forEach(m => {
                const oldHTML = m.options.icon.options.html;
                const symbolMatch = oldHTML.match(/>(.*)<\/div>/);
                if (!symbolMatch) return;
                const symbol = symbolMatch[1];
                const colorMatch = oldHTML.match(/background:(.*?);/);
                const color = colorMatch ? colorMatch[1] : "#ff0000";
                m.setIcon(createCustomIcon(symbol, color));
            });
        }
        window.addEventListener('resize', resizeMarkers);

        // ===== LOCALIZZAZIONE UTENTE =====
        function locateUser() { map.locate({ setView: true, maxZoom: 16 }); }
        map.on('locationfound', e => { L.marker(e.latlng).addTo(map).bindPopup("Sei qui").openPopup(); });

    </script>
</body>

</html>
