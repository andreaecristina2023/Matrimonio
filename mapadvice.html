<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andrea e Cristina 04.06.2026</title>

    <link rel="icon" type="image/png"
        href="https://raw.githubusercontent.com/andreaecristina2023/Matrimonio/main/images/logo.png">

    <link href="https://fonts.googleapis.com/css2?family=Kaushan+Script&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            font-family: 'Kaushan Script', cursive;
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: linear-gradient(rgba(0, 0, 0, 0.35), rgba(0, 0, 0, 0.35)),
                url('https://raw.githubusercontent.com/andreaecristina2023/Matrimonio/main/images/background.jpg') center/cover no-repeat;
            z-index: -1;
        }

        .central-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            width: 100%;
            min-height: 100vh;
            padding-top: 5vh;
        }

        .central-container {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        #map {
            width: 90%;
            max-width: 1000px;
            height: 65vh;
            border-radius: 15px;
            margin-top: 20px;
    overflow: hidden;
        }

        nav .menu a,
        .mobile-menu a {
            color: rgba(255, 255, 255, 0.85);
            text-decoration: none;
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
        }

        nav .menu a:hover:not(.active),
        .mobile-menu a:hover:not(.active) {
            border-bottom: 2px solid #ff0000;
        }

        nav .menu a.active,
        .mobile-menu a.active {
            color: #ff0000;
            font-weight: bold;
        }

        .marker-number div,
        .marker-special div,
        .marker-municipio div {
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            text-align: center;
            font-size: 1.2em;
            color: white;
        }

        .marker-number div {
            background: #8e24aa;
        }

        .marker-special div {
            background: #ff4081;
        }

        .marker-municipio div {
            background: #4caf50;
        }
    </style>
</head>

<body>

    <div id="menu-placeholder"></div>

    <div class="central-wrapper" id="centralWrapper">
        <div class="central-container">
            <div id="map"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        console.log("🚀 Inizio script mappa");

        // ===== CARICA MENU =====
        fetch('menu.html')
            .then(resp => resp.text())
            .then(html => {
                document.getElementById('menu-placeholder').innerHTML = html;
                console.log("✅ Menu caricato");

                const menuTitle = document.getElementById('menuPageTitle');
                if (menuTitle) menuTitle.textContent = "Mappa dei consigli";

                const hamburger = document.getElementById('hamburger');
                const mobileMenu = document.getElementById('mobileMenu');
                if (hamburger && mobileMenu) {
                    hamburger.addEventListener('click', () => mobileMenu.style.display = mobileMenu.style.display === 'flex' ? 'none' : 'flex');
                    mobileMenu.querySelectorAll('a').forEach(link => link.addEventListener('click', () => mobileMenu.style.display = 'none'));
                    window.addEventListener('resize', () => { if (window.innerWidth > 768) mobileMenu.style.display = 'none'; });
                }

                const currentPage = location.pathname.split("/").pop() || 'homepage.html';
                document.querySelectorAll('nav .menu a, nav .mobile-menu a').forEach(link => {
                    if (link.getAttribute('href') === currentPage) link.classList.add('active');
                });

                updateCentralPosition();
                window.addEventListener('resize', updateCentralPosition);
            })
            .catch(err => console.warn('❌ Errore caricamento menu:', err));

                // Centra wrapper verticale
        function updateCentralPosition() {
            const nav = document.querySelector('nav');
            const wrapper = document.getElementById('centralWrapper');
            const menuTitle = 0//document.getElementById('menuPageTitle');    

            if (nav) {
                const totalHeight = 2 * nav.offsetHeight + (menuTitle ? menuTitle.offsetHeight : 0);
                const availableHeight = window.innerHeight - totalHeight;
                wrapper.style.height = `${availableHeight}px`;
                wrapper.style.paddingTop = `${availableHeight * 0.20}px`;
                wrapper.style.visibility = 'visible';
            }
        }

        // ===== MAPPA =====
        const CENTRO = { lat: 44.14919, lon: 12.13341 };
        const csvURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQoiq8woGXo_hibNIDK3gsBSR56zgU4FEvPP0-lmdfv24Bt_l0hz6Jyh0jCsG8W_pKYsB2JKEGzaURo/pub?gid=436600834&single=true&output=csv";

        const map = L.map('map', { zoomControl: false }).setView([CENTRO.lat, CENTRO.lon], 14);
        L.control.zoom({ position: 'bottomleft' }).addTo(map);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

function parseCSV(text) {
    const lines = text.split("\n").filter(l => l.trim() !== "");
    return lines.map(line => {
        const separator = line.includes(";") ? ";" : ",";
        return line.split(separator).map(c => c.replace(/^"|"$/g,'').trim());
    });
}

        // icona proporzionale
        function getIconSize() {
            return Math.round(Math.min(window.innerWidth, window.innerHeight) * 0.08);
        }

        function createNumberIcon(text) {
            const size = getIconSize();
            return L.divIcon({ className: 'marker-number', html: `<div>${text}</div>`, iconSize: [size, size], iconAnchor: [size / 2, size] });
        }
        function createSpecialIcon(symbol) {
            const size = getIconSize();
            return L.divIcon({ className: 'marker-special', html: `<div>${symbol}</div>`, iconSize: [size, size], iconAnchor: [size / 2, size] });
        }
        function createMunicipioIcon() {
            const size = getIconSize();
            return L.divIcon({ className: 'marker-municipio', html: `<div>🏛️</div>`, iconSize: [size, size], iconAnchor: [size / 2, size] });
        }

        // Municipio
        const municipioMarker = L.marker([CENTRO.lat, CENTRO.lon], { icon: createMunicipioIcon() }).addTo(map);
        console.log("🏛️ Municipio aggiunto");

        // Punti speciali
        const specialPoints = [
            { lat: 44.14268, lon: 12.09886, label: "Casa degli Sposi", symbol: "❤️" },
            { lat: 44.14925, lon: 12.13385, label: "Enoteca Colonna Panorama", symbol: "🥂" },
            { lat: 44.15848, lon: 12.18447, label: "Agriturismo Al Colle", symbol: "🍴" }
        ];
        const specialMarkers = [];
        specialPoints.forEach(p => {
            const m = L.marker([p.lat, p.lon], { icon: createSpecialIcon(p.symbol) })
                .addTo(map)
                .bindPopup(`<b>${p.label}</b><br><a href="https://www.google.com/maps/dir/?api=1&destination=${p.lat},${p.lon}" target="_blank">🚗 Naviga</a>`);
            specialMarkers.push(m);
        });
        console.log("✨ Punti speciali aggiunti");

        // CSV parcheggi
        const parkingMarkers = [];
        fetch(csvURL)
            .then(r => r.text())
            .then(text => {
                const rows = parseCSV(text).slice(1); // salta intestazioni
                rows.forEach((cols, i) => {
                    const lat = parseFloat(cols[0]);
                    const lon = parseFloat(cols[1]);
                    const descrizione = cols[2] || `Parcheggio ${i + 1}`;
                    if (!isNaN(lat) && !isNaN(lon)) {
                        const m = L.marker([lat, lon], { icon: createNumberIcon(`P${String(i + 1).padStart(2, '0')}`) })
                            .addTo(map)
                            .bindPopup(`<b>${descrizione}</b><br><a href="https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}" target="_blank">🚗 Naviga</a>`);
                        parkingMarkers.push(m);
                        console.log(`🅿️ Parcheggio caricato: ${descrizione} (${lat},${lon})`);
                    }
                });
            })
            .catch(err => console.warn('❌ Errore caricamento CSV:', err));

        // Ridimensionamento dinamico icone
        function resizeMarkers() {
            const allMarkers = [municipioMarker, ...specialMarkers, ...parkingMarkers];
            allMarkers.forEach(m => {
                const oldLatLng = m.getLatLng();
                const oldText = m.options.icon.options.html;
                let newIcon;
                if (m.options.icon.options.className === 'marker-number') newIcon = createNumberIcon(oldText.match(/<div>(.*)<\/div>/)[1]);
                else if (m.options.icon.options.className === 'marker-special') newIcon = createSpecialIcon(oldText.match(/<div>(.*)<\/div>/)[1]);
                else if (m.options.icon.options.className === 'marker-municipio') newIcon = createMunicipioIcon();
                m.setIcon(newIcon);
            });
            console.log("🔄 Icone ridimensionate");
        }

        window.addEventListener('resize', resizeMarkers);

        // Localizzazione utente
        function locateUser() { map.locate({ setView: true, maxZoom: 16 }); }
        map.on('locationfound', e => {
            L.marker(e.latlng).addTo(map).bindPopup("Sei qui").openPopup();
        });
    </script>
</body>

</html>>
