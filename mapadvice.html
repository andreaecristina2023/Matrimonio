<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Andrea e Cristina 04.06.2026</title>

<link rel="icon" type="image/png" href="https://raw.githubusercontent.com/andreaecristina2023/Matrimonio/main/images/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Kaushan+Script&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { font-family:'Kaushan Script', cursive; width:100%; height:100%; overflow-x:hidden; }
body::before {
    content:""; position:fixed; inset:0;
    background:linear-gradient(rgba(0,0,0,0.35),rgba(0,0,0,0.35)), url('https://raw.githubusercontent.com/andreaecristina2023/Matrimonio/main/images/background.jpg') center/cover no-repeat;
    z-index:-1;
}

.central-wrapper { display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; width:100%; min-height:90vh; padding-top:5vh; }
.central-container { width:100%; display:flex; justify-content:center; }
#map { width:90%; max-width:1000px; height:70vh; border-radius:15px; overflow:hidden; }

.marker-number div, .marker-special div, .marker-municipio div {
    display:flex; align-items:center; justify-content:center; border-radius:50%; width:100%; height:100%;
    text-align:center; font-size:2em; color:white; font-family:'Kaushan Script', cursive;
}
.marker-number div { background:#8e24aa; }
.marker-special div { background:#ff0000; }
.marker-municipio div { background:#4caf50; }

.leaflet-popup-content { font-family:'Kaushan Script', cursive !important; font-size:1.1rem; text-align:left; min-width:220px; }
.leaflet-popup-content a { color:#0000ff; text-decoration:none; font-weight:bold; }
.leaflet-popup-content a:hover { text-decoration:underline; }

/* Popup wrapper dinamico */
.leaflet-popup-content-wrapper {
    background:transparent !important;
    border-radius:8px;
    padding:0 !important;
    border:2px solid var(--popup-border-color,#ff0000);
    box-shadow:none !important;
}
.leaflet-popup-tip {
    background: var(--popup-border-color,#ff0000) !important;
}

/* Responsive mobile */
@media(max-width:600px){
    .leaflet-popup-content { font-size:1rem !important; }
    .leaflet-popup-content div { font-size:16px !important; }
    .leaflet-popup-content a[target="_blank"] { padding:5px 8px !important; font-size:14px !important; }
}
</style>
</head>
<body>

<div id="menu-placeholder"></div>
<div class="central-wrapper" id="centralWrapper">
    <div class="central-container">
        <div id="map"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
console.log("🚀 Inizio script mappa");

// ===== MAPPA =====
const CENTRO = {lat:44.15058, lon:12.141665};
const map = L.map('map', {zoomControl:false}).setView([CENTRO.lat,CENTRO.lon],13);
L.control.zoom({position:'bottomleft'}).addTo(map);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

const csvURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQBV9faZqgv88uu4_Z790474hIu-ik9XnOOQckWEWuPeMKSQ26VQrXwGCBeFn-WLRb7nbU0sd1pqkBg/pub?gid=279539594&single=true&output=csv";

// ===== UTILITY =====
function parseCSVtoObjects(text){
    text = text.replace(/^\uFEFF/, '');
    const lines = text.split(/\r?\n/).filter(l=>l.trim()!=='');
    function splitCSV(line){
        const result=[], n=line.length; let current="", insideQuotes=false;
        for(let i=0;i<n;i++){
            const char=line[i], next=line[i+1];
            if(char==='"' && insideQuotes && next==='"'){ current+='"'; i++; }
            else if(char==='"'){ insideQuotes=!insideQuotes; }
            else if(char===',' && !insideQuotes){ result.push(current.trim()); current=""; }
            else { current+=char; }
        }
        result.push(current.trim());
        return result;
    }
    const header = splitCSV(lines[0]).map(h=>h.trim());
    return lines.slice(1).map(line=>{
        const cols = splitCSV(line), obj={};
        header.forEach((h,i)=>{ obj[h]=(cols[i]||"").trim(); });
        return obj;
    });
}

function getIconSize(){ return Math.round(Math.min(window.innerWidth,window.innerHeight)*0.06); }
function getFontSize(size){ return Math.round(size*0.45); }

function createCustomIcon(symbol,color="#ff0000"){
    const size=getIconSize(), fontSize=getFontSize(size);
    return L.divIcon({
        className:'marker-special',
        html:`<div style="font-family:'Kaushan Script', cursive;font-size:${fontSize}px;background:${color};border-radius:50%;width:${size}px;height:${size}px;display:flex;align-items:center;justify-content:center;color:white;">${symbol}</div>`,
        iconSize:[size,size], iconAnchor:[size/2,size/2], popupAnchor:[0,-size/2]
    });
}
function createNumberIcon(symbol,color="#2196f3"){
    const size=getIconSize(), fontSize=getFontSize(size);
    return L.divIcon({
        className:'marker-number',
        html:`<div style="font-family:'Kaushan Script', cursive;font-size:${fontSize}px;background:${color};border-radius:50%;width:${size}px;height:${size}px;display:flex;align-items:center;justify-content:center;color:white;">${symbol}</div>`,
        iconSize:[size,size], iconAnchor:[size/2,size/2], popupAnchor:[0,-size/2]
    });
}

// ===== CARICAMENTO MARKER =====
const allMarkers=[];
fetch(csvURL).then(r=>r.text()).then(text=>{
    const points=parseCSVtoObjects(text);
    points.forEach(p=>{
        const lat=parseFloat(p.Latitudine), lon=parseFloat(p.Longitudine);
        if(isNaN(lat) || isNaN(lon)) return;

        const color=(p.Colore||"#ff0000").trim();
        const markerIcon = (p.Categoria==="Parcheggi") ? createNumberIcon(p.Simbolo,color) : createCustomIcon(p.Simbolo,color);

        // Imposta il colore della cornice popup
        document.documentElement.style.setProperty('--popup-border-color', color);

        const isSpecialColor = color.toLowerCase() === "#d81b60";
        const descriptionTextColor = isSpecialColor ? "#ff0000" : color;

        const popupHTML = `
        <div style="
            line-height:1.4;
            background:${color};
            padding:8px;
            border-radius:8px;
            border:2px solid ${color};
        ">
            <div style="
                background:white;
                color:${descriptionTextColor};
                font-size:18px;
                font-weight:bold;
                padding:6px 10px;
                border-radius:6px;
                margin-bottom:6px;
                text-align:center;
                width:100%;
                box-sizing:border-box;
                box-shadow:0 2px 6px rgba(0,0,0,0.25);
            ">
                ${p.Descrizione}
            </div>
            ${p.Indirizzo?`📍 Indirizzo: ${p.Indirizzo}<br>`:""}
            ${p.Telefono?`📞 Telefono: <a href="tel:${p.Telefono}">${p.Telefono}</a><br>`:""}
            ${p["Posti auto"]?`🅿️ Posti: ${p["Posti auto"]}<br>`:""}
            ${p.Accessibilità?`♿ Accessibilità: ${p.Accessibilità}<br>`:""}
            ${p.Distanza?`📏 Distanza: ${p.Distanza}<br>`:""}
            ${p["Lunghezza percorso dal Comune"]?`📐 Lunghezza percorso: ${p["Lunghezza percorso dal Comune"]}<br>`:""}
            ${p.Dislivello?`⛰️ Dislivello: ${p.Dislivello}<br>`:""}
            ${p.Note?`📝 Note: ${p.Note}<br>`:""}
            <div style="display:flex;justify-content:center;margin-top:6px;">
                <a href="https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}" target="_blank" style="
                    background:white;
                    color:${color};
                    padding:6px 12px;
                    border-radius:5px;
                    font-weight:bold;
                    text-decoration:none;
                    box-shadow:0 1px 4px rgba(0,0,0,0.2);
                ">🚗 Naviga 🚗</a>
            </div>
        </div>
        `;

        const marker=L.marker([lat,lon],{icon:markerIcon});
        marker.category=p.Categoria||"Altro";
        marker.bindPopup(popupHTML).addTo(map);
        allMarkers.push(marker);
    });
});
</script>
</body>
</html>
