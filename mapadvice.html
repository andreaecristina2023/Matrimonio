<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Andrea e Cristina 04.06.2026</title>
<link rel="icon" type="image/png" href="https://raw.githubusercontent.com/andreaecristina2023/Matrimonio/main/images/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Kaushan+Script&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html, body{font-family:'Kaushan Script', cursive;width:100%;height:100%;overflow-x:hidden;}
  body::before{
    content:"";position:fixed;inset:0;
    background:linear-gradient(rgba(0,0,0,0.35),rgba(0,0,0,0.35)),url('https://raw.githubusercontent.com/andreaecristina2023/Matrimonio/main/images/background.jpg') center/cover no-repeat;
    z-index:-1;
  }
  .central-wrapper{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;width:100%;min-height:90vh;padding-top:5vh;}
  .central-container{width:100%;display:flex;justify-content:center;}
  #map{width:90%;max-width:1000px;height:70vh;border-radius:15px;overflow:hidden;}
  nav .menu a,.mobile-menu a{color:rgba(255,255,255,0.85);text-decoration:none;border-bottom:2px solid transparent;transition:all 0.3s;}
  nav .menu a:hover:not(.active),.mobile-menu a:hover:not(.active){border-bottom:2px solid #ff0000;}
  nav .menu a.active,.mobile-menu a.active{color:#ff0000;font-weight:bold;}
  .marker-number div,.marker-special div,.marker-municipio div{display:flex;align-items:center;justify-content:center;border-radius:50%;width:100%;height:100%;text-align:center;font-size:2em;color:white;font-family:'Kaushan Script', cursive;}
  .marker-number div{background:#8e24aa;}
  .marker-special div{background:#ff0000;}
  .marker-municipio div{background:#4caf50;}
  .leaflet-popup-content{font-family:'Kaushan Script', cursive !important;font-size:1.1rem;text-align:left;min-width:220px;}
  .leaflet-popup-content a{color:#0000ff;text-decoration:none;font-weight:bold;}
  .leaflet-popup-content a:hover{text-decoration:underline;}
  .info.legend{font-family:'Kaushan Script', cursive;background:white;padding:12px;border-radius:10px;text-align:left;font-size:1rem;box-shadow:0 6px 18px rgba(0,0,0,0.2);}
  .info.legend b{display:block;margin-bottom:6px;}
  .legend-toggle{display:none;font-family:'Kaushan Script',cursive;font-size:1rem;background:#ff0000;color:white;border:none;border-radius:5px;padding:5px 10px;cursor:pointer;margin-bottom:5px;}
  @media(max-width:768px){.legend-toggle{display:block;}.info.legend{display:none;position:absolute;top:50px;right:10px;z-index:1000;}.info.legend.show{display:block;}}
</style>
</head>
<body>
<div id="menu-placeholder"></div>
<div class="central-wrapper" id="centralWrapper">
  <div class="central-container"><div id="map"></div></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
console.log("🚀 Inizio script mappa");

// ===== DEFINIZIONI GLOBALI =====
const allMarkers = [];
const CENTRO = { lat: 44.15058, lon: 12.141665 };
const map = L.map('map', { zoomControl: false }).setView([CENTRO.lat, CENTRO.lon], 13);
L.control.zoom({ position: 'bottomleft' }).addTo(map);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

function cleanField(f) { return (f || "").trim().replace(/[\u200B-\u200D\uFEFF]/g, ''); }
function getIconSize() { return Math.round(Math.min(window.innerWidth, window.innerHeight) * 0.06); }
function getFontSize(size) { return Math.round(size * 0.45); }

function createCustomIcon(symbol, color = "#ff0000") {
    const s = getIconSize(), f = getFontSize(s);
    return L.divIcon({
        className: 'marker-special',
        html: `<div style="font-family:'Kaushan Script', cursive;font-size:${f}px;background:${color};border-radius:50%;width:${s}px;height:${s}px;display:flex;align-items:center;justify-content:center;color:white;">${symbol}</div>`,
        iconSize: [s, s], iconAnchor: [s/2, s/2], popupAnchor: [0, -s/2]
    });
}

function createNumberIcon(symbol, color = "#2196f3") {
    const s = getIconSize(), f = getFontSize(s);
    return L.divIcon({
        className: 'marker-number',
        html: `<div style="font-family:'Kaushan Script', cursive;font-size:${f}px;background:${color};border-radius:50%;width:${s}px;height:${s}px;display:flex;align-items:center;justify-content:center;color:white;">${symbol}</div>`,
        iconSize: [s, s], iconAnchor: [s/2, s/2], popupAnchor: [0, -s/2]
    });
}

// ===== CARICAMENTO MENU =====
fetch('menu.html').then(r => r.text()).then(html => {
    document.getElementById('menu-placeholder').innerHTML = html;
    const menuTitle = document.getElementById('menuPageTitle');
    if(menuTitle) menuTitle.textContent = "Mappa dei consigli";
}).catch(e => console.warn("Errore menu", e));

// ===== CARICAMENTO HTML GOOGLE SHEETS =====
const pubhtmlURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQBV9faZqgv88uu4_Z790474hIu-ik9XnOOQckWEWuPeMKSQ26VQrXwGCBeFn-WLRb7nbU0sd1pqkBg/pubhtml?gid=279539594&single=true";

fetch(pubhtmlURL).then(r => r.text()).then(html => {
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    const rows = Array.from(doc.querySelectorAll('table tbody tr'));
    const points = rows.map(tr => {
        const cells = tr.querySelectorAll('td');
        return {
            Descrizione: cleanField(cells[0]?.textContent),
            Latitudine: cleanField(cells[1]?.textContent),
            Longitudine: cleanField(cells[2]?.textContent),
            Colore: cleanField(cells[3]?.textContent),
            Categoria: cleanField(cells[4]?.textContent),
            Indirizzo: cleanField(cells[5]?.textContent),
            Telefono: cleanField(cells[6]?.textContent),
            "Posti auto": cleanField(cells[7]?.textContent),
            Accessibilità: cleanField(cells[8]?.textContent),
            Distanza: cleanField(cells[9]?.textContent),
            "Lunghezza percorso dal Comune": cleanField(cells[10]?.textContent),
            Dislivello: cleanField(cells[11]?.textContent),
            Note: cleanField(cells[12]?.textContent),
            Simbolo: cleanField(cells[13]?.textContent),
            SitoWeb: cleanField(cells[14]?.textContent)
        };
    });

    // ===== CREAZIONE MARKER =====
    points.forEach(p => {
        const lat = parseFloat(p.Latitudine), lon = parseFloat(p.Longitudine);
        if(isNaN(lat) || isNaN(lon)) return;
        const color = p.Colore || "#ff0000";
        const markerIcon = (p.Categoria === "Parcheggi") ? createNumberIcon(p.Simbolo, color) : createCustomIcon(p.Simbolo, color);

        const popupHTML = `
        <div style="line-height:1.4;background:rgba(255,255,255,0.9);padding:8px;border-radius:10px;border:2px solid ${color};">
            <div style="background:white;color:${color};font-weight:bold;padding:6px 10px;border-radius:6px;text-align:center;margin-bottom:6px;">
                ${p.Descrizione}
            </div>
            ${p.Indirizzo ? `📍 Indirizzo: ${p.Indirizzo}<br>` : ""}
            ${p.Telefono ? `📞 Telefono: <a href="tel:${p.Telefono}">${p.Telefono}</a><br>` : ""}
            ${p["Posti auto"] ? `🅿️ Posti: ${p["Posti auto"]}<br>` : ""}
            ${p.Accessibilità ? `♿ Accessibilità: ${p.Accessibilità}<br>` : ""}
            ${p.Distanza ? `📏 Distanza: ${p.Distanza}<br>` : ""}
            ${p["Lunghezza percorso dal Comune"] ? `📐 Lunghezza percorso: ${p["Lunghezza percorso dal Comune"]}<br>` : ""}
            ${p.Dislivello ? `⛰️ Dislivello: ${p.Dislivello}<br>` : ""}
            ${p.Note ? `📝 Note: ${p.Note}<br>` : ""}
            ${p.SitoWeb ? `🌐 Sito web: <a href="${p.SitoWeb}" target="_blank">${p.SitoWeb}</a><br>` : ""}
            <div style="text-align:center;margin-top:6px;">
                <a href="https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}" target="_blank" style="background:white;color:${color};padding:6px 12px;border-radius:5px;font-weight:bold;text-decoration:none;">🚗 Naviga 🚗</a>
            </div>
        </div>`;

        const marker = L.marker([lat, lon], { icon: markerIcon });
        marker.category = p.Categoria || "Altro";
        marker.bindPopup(popupHTML).addTo(map);
        allMarkers.push(marker);
    });

    // ===== LEGENDA =====
    const categories = [...new Set(points.map(p => p.Categoria).filter(c => c))];
    const legendControl = L.control({ position: 'topright' });
    legendControl.onAdd = function(map) {
        const wrapper = L.DomUtil.create('div');
        const toggle = L.DomUtil.create('button','legend-toggle',wrapper);
        toggle.innerHTML='☰ Legenda';
        const legendDiv = L.DomUtil.create('div','info legend',wrapper);
        legendDiv.innerHTML='<b>Legenda</b>';
        categories.forEach(cat => {
            const id = "chk_" + cat.replace(/\s/g,''), isChecked = (cat==="Luoghi principali"||cat==="Parcheggi");
            const row = document.createElement('div');
            row.innerHTML = `<input type="checkbox" id="${id}" ${isChecked?"checked":""}><label for="${id}"> ${cat}</label>`;
            legendDiv.appendChild(row);
            allMarkers.forEach(m => { if(m.category===cat && !isChecked) map.removeLayer(m) });
            row.querySelector('input').addEventListener('change', e => {
                allMarkers.forEach(m => { if(m.category===cat) e.target.checked ? m.addTo(map) : map.removeLayer(m) });
            });
        });
        toggle.addEventListener('click', () => legendDiv.classList.toggle('show'));
        return wrapper;
    };
    legendControl.addTo(map);

}).catch(e => console.warn("Errore caricamento Google Sheet", e));
</script>
</body>
</html>
