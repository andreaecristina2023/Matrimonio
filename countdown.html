<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Andrea e Cristina 04.06.2026</title>

  <link rel="icon" type="image/png"
    href="https://raw.githubusercontent.com/andreaecristina2023/Matrimonio/main/images/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Kaushan+Script&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Kaushan Script', cursive;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)),
        url("https://raw.githubusercontent.com/andreaecristina2023/Matrimonio/main/images/background.jpg") no-repeat center center;
      background-size: cover;
      z-index: -1;
    }

    /* ===== MENU ===== */
    nav .menu a,
    .mobile-menu a {
      color: rgba(255, 255, 255, 0.85);
      text-decoration: none;
      border-bottom: 2px solid transparent;
      transition: all 0.3s;
    }

    nav .menu a:hover:not(.active),
    .mobile-menu a:hover:not(.active) {
      border-bottom: 2px solid #ff0000;
    }

    nav .menu a.active,
    .mobile-menu a.active {
      color: #ff0000;
      font-weight: bold;
    }

    /* ===== CONTENITORE ===== */
    .central-container {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      text-align: center;
    }

    /* ===== PULSANTI SI / NO ===== */
    #btnWrapper {
      display: flex;
      gap: 30px;
      margin-bottom: 30px;
      transition: opacity 0.5s ease;
    }

    .main-btn {
      font-family: 'Kaushan Script', cursive;
      font-size: 26px;
      padding: 10px 30px;
      border-radius: 30px;
      color: white;
      border: none;
      cursor: pointer;
      animation: glowBtn 1.5s infinite alternate;
      transition: background 0.4s, opacity 0.4s, transform 0.15s;
      min-width: 120px;
    }

    .main-btn:not(:disabled):hover {
      transform: scale(1.07);
    }

    #btnSi {
      background: #2e7d32;
    }

    #btnNo {
      background: #a32f2f;
    }

    /* Stato: grigio (non scelto) */
    .main-btn.greyed {
      background: #777 !important;
      opacity: 0.55;
      cursor: default;
      animation: none;
    }

    /* Stato: pause (scelto, in esecuzione) */
    .main-btn.is-pause {
      background: #a32f2f !important;
      animation: none;
      opacity: 1;
    }

    /* Stato: play (scelto, in pausa) */
    .main-btn.is-play {
      background: #1565c0 !important;
      animation: none;
      opacity: 1;
    }

    @keyframes glowBtn {
      from {
        box-shadow: 0 0 4px rgba(255, 255, 255, 0.2);
      }

      to {
        box-shadow: 0 0 18px rgba(255, 255, 255, 0.5);
      }
    }

    /* ===== TITOLI SOVRAPPOSTI ===== */
    .title-wrapper {
      position: relative;
      height: 44px;
      width: 100%;
      margin-bottom: 20px;
    }

    .title-wrapper span {
      position: absolute;
      left: 50%;
      top: 0;
      transform: translateX(-50%);
      white-space: nowrap;
      font-size: clamp(22px, 5vw, 28px);
      color: #ff0000;
      text-shadow: 0px 0px 20px #000, 0px 0px 4px #000, 1px 1px 0 #000;
      opacity: 0;
      transition: opacity 0.7s ease;
    }

    /* ===== STACK WRAPPER ===== */
    #stackWrapper {
      position: relative;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 200px;
    }

    /* ===== LISTA ===== */
    .sequence {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      gap: 14px;
      align-items: center;
      opacity: 0;
      transition: opacity 0.6s ease;
      pointer-events: none;
    }

    .sequence p {
      opacity: 0;
      font-size: clamp(17px, 4vw, 23px);
      transition: opacity 0.6s ease;
    }

    .light {
      color: white;
      text-shadow: 0 1px 4px rgba(255, 255, 255, 0.3);
    }

    .highlight {
      color: #ff0000;
      text-shadow: 0px 0px 20px #000, 0px 0px 4px #000, 1px 1px 0 #000;
    }

    /* ===== COUNTDOWN ===== */
    #countdown {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      opacity: 0;
      transition: opacity 0.7s ease;
      pointer-events: none;
    }

    .box {
      aspect-ratio: 1/1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.9);
      width: 110px;
      opacity: 0;
      transition: opacity 0.6s ease;
      animation: blinkShadow 1.5s infinite alternate;
    }

    @keyframes blinkShadow {
      from {
        box-shadow: 0 0 10px rgba(255, 0, 0, 0.4);
      }

      to {
        box-shadow: 0 0 30px rgba(255, 0, 0, 0.9);
      }
    }

    .number {
      font-size: 36px;
      color: #ff0000;
      text-shadow: 0px 0px 20px #000, 0px 0px 4px #000, 1px 1px 0 #000;
    }

    .label {
      font-size: 16px;
      color: #ff0000;
      text-shadow: 0px 0px 20px #000, 0px 0px 4px #000, 1px 1px 0 #000;
    }

    @media(max-width:768px) {
      #countdown {
        grid-template-columns: repeat(2, 1fr);
      }

      .box {
        width: 90px;
      }

      #stackWrapper {
        min-height: 240px;
      }
    }
  </style>
</head>

<body>

  <div id="menu-placeholder"></div>

  <div class="central-container">

    <div id="btnWrapper">
      <button class="main-btn" id="btnSi">Si!!!</button>
      <button class="main-btn" id="btnNo">No!!!</button>
    </div>

    <div class="title-wrapper">
      <span id="titleRicorda">Ricordatevi di portare:</span>
      <span id="titleMancano">...perché mancano solo...</span>
    </div>

    <div id="stackWrapper">
      <div class="sequence" id="sequence">
        <p class="light">1. Il vostro sorriso migliore!</p>
        <p class="light">2. Un costume!</p>
        <p class="light">3. Tanta voglia di divertirvi!</p>
        <p class="highlight">4. Scarpe rosse e comode!</p>
      </div>
      <div id="countdown">
        <div class="box">
          <div class="number" id="days">0</div>
          <div class="label">gg</div>
        </div>
        <div class="box">
          <div class="number" id="hours">0</div>
          <div class="label">hh</div>
        </div>
        <div class="box">
          <div class="number" id="minutes">0</div>
          <div class="label">mm</div>
        </div>
        <div class="box">
          <div class="number" id="seconds">0</div>
          <div class="label">ss</div>
        </div>
      </div>
    </div>

  </div>

  <audio id="bgMusic"
    src="https://raw.githubusercontent.com/andreaecristina2023/Matrimonio/main/music/Are_You_Ready_For_This.mp3"></audio>

  <script>
    // ===== CARICA MENU =====
    fetch('menu.html')
      .then(resp => resp.text())
      .then(html => {
        document.getElementById('menu-placeholder').innerHTML = html;

        const menuTitle = document.getElementById('menuPageTitle');
        if (menuTitle) menuTitle.textContent = "Siete pront*?!";

        const hamburger = document.getElementById('hamburger');
        const mobileMenu = document.getElementById('mobileMenu');
        if (hamburger && mobileMenu) {
          hamburger.addEventListener('click', () => mobileMenu.style.display = mobileMenu.style.display === 'flex' ? 'none' : 'flex');
          mobileMenu.querySelectorAll('a').forEach(link => link.addEventListener('click', () => mobileMenu.style.display = 'none'));
          window.addEventListener('resize', () => { if (window.innerWidth > 768) mobileMenu.style.display = 'none'; });
        }

        const currentPage = location.pathname.split("/").pop() || 'countdown.html';
        document.querySelectorAll('nav .menu a, nav .mobile-menu a').forEach(link => {
          if (link.getAttribute('href') === currentPage) link.classList.add('active');
        });

        updateLayout();
        window.addEventListener('resize', updateLayout);
      })
      .catch(err => console.warn('❌ Errore caricamento menu:', err));

    function updateLayout() {
      const nav = document.querySelector('nav');
      const container = document.querySelector('.central-container');
      const btnWrap = document.getElementById('btnWrapper');
      if (!nav || !container) return;
      const navH = nav.offsetHeight;
      const avail = window.innerHeight - navH;
      container.style.marginTop = navH + 'px';
      container.style.paddingTop = Math.max(20, avail * 0.15) + 'px';
      if (btnWrap) btnWrap.style.marginBottom = Math.max(16, avail * 0.06) + 'px';
    }

    // ===== ELEMENTI =====
    const bgMusic = document.getElementById("bgMusic");
    const btnSi = document.getElementById("btnSi");
    const btnNo = document.getElementById("btnNo");
    const titleRicorda = document.getElementById("titleRicorda");
    const titleMancano = document.getElementById("titleMancano");
    const sequence = document.getElementById("sequence");
    const lines = document.querySelectorAll("#sequence p");
    const countdown = document.getElementById("countdown");

    let timeouts = [], isPaused = false, resumeFn = null;
    // stato: 'idle' | 'running-si' | 'running-no' | 'paused-si' | 'paused-no'
    let state = 'idle';

    // ===== HELPERS =====
    function wait(ms, fn) {
      const t = setTimeout(() => { if (!isPaused) fn(); else resumeFn = fn; }, ms);
      timeouts.push(t);
    }

    function resetVisuals() {
      titleRicorda.style.opacity = 0;
      titleMancano.style.opacity = 0;
      sequence.style.opacity = 0;
      countdown.style.opacity = 0;
      lines.forEach(l => l.style.opacity = 0);
      document.querySelectorAll(".box").forEach(b => b.style.opacity = 0);
    }

    function resetTimers() {
      timeouts.forEach(t => clearTimeout(t));
      timeouts = [];
      resumeFn = null;
    }

    // Aggiorna aspetto pulsanti in base allo stato
    function renderBtns() {
      // Defaults
      btnSi.disabled = false; btnNo.disabled = false;
      btnSi.className = 'main-btn'; btnNo.className = 'main-btn';
      btnSi.innerText = "Sì!!!"; btnNo.innerText = "No!!!";

      if (state === 'running-si') {
        btnSi.classList.add('is-pause'); btnSi.innerText = "⏸️ Pause";
        btnNo.classList.add('greyed'); btnNo.disabled = true;
      } else if (state === 'running-no') {
        btnNo.classList.add('is-pause'); btnNo.innerText = "⏸️ Pause";
        btnSi.classList.add('greyed'); btnSi.disabled = true;
      } else if (state === 'paused-si') {
        btnSi.classList.add('is-play'); btnSi.innerText = "🎵 Play";
        // btnNo è libero → si può cliccare per cambiare
      } else if (state === 'paused-no') {
        btnNo.classList.add('is-play'); btnNo.innerText = "🎵 Play";
        // btnSi è libero → si può cliccare per cambiare
      }
    }

    // ===== CLICK HANDLER UNICO =====
    function onBtnClick(who) { // who: 'si' | 'no'
      if (state === 'idle') {
        // Partenza
        who === 'si' ? startSi() : startNo();

      } else if (state === 'running-si' && who === 'si') {
        // Pausa
        doPause('si');

      } else if (state === 'running-no' && who === 'no') {
        // Pausa
        doPause('no');

      } else if (state === 'paused-si' && who === 'si') {
        // Riprendi
        doResume('si');

      } else if (state === 'paused-no' && who === 'no') {
        // Riprendi
        doResume('no');

      } else if (state === 'paused-si' && who === 'no') {
        // Cambio scelta: era si, ora no
        doSwitch('no');

      } else if (state === 'paused-no' && who === 'si') {
        // Cambio scelta: era no, ora si
        doSwitch('si');
      }
    }

    function doPause(who) {
      isPaused = true;
      bgMusic.pause();
      // Cancella solo i timer pendenti, ma preserva resumeFn
      timeouts.forEach(t => clearTimeout(t));
      timeouts = [];
      state = who === 'si' ? 'paused-si' : 'paused-no';
      renderBtns();
    }

    function doResume(who) {
      isPaused = false;
      bgMusic.play();
      state = who === 'si' ? 'running-si' : 'running-no';
      renderBtns();
      if (resumeFn) resumeFn();
    }

    function doSwitch(who) {
      isPaused = false;
      resetTimers();
      resetVisuals();
      bgMusic.pause();
      bgMusic.currentTime = 0;
      state = 'idle';
      renderBtns();
      who === 'si' ? startSi() : startNo();
    }

    btnSi.addEventListener('click', () => onBtnClick('si'));
    btnNo.addEventListener('click', () => onBtnClick('no'));

    // ===== COUNTDOWN =====
    function showCountdown() {
      if (isPaused) { resumeFn = showCountdown; return; }
      titleMancano.style.opacity = 1;
      resumeFn = showBoxes;
      wait(1500, showBoxes);
    }

    function showBoxes() {
      if (isPaused) { resumeFn = showBoxes; return; }
      countdown.style.opacity = 1;
      document.querySelectorAll(".box").forEach(b => b.style.opacity = 1);
    }

    // ===== PERCORSO "Sì" =====
    function startSi() {
      state = 'running-si';
      renderBtns();
      bgMusic.play();
      resumeFn = showCountdown;
      wait(1500, showCountdown);
    }

    // ===== PERCORSO "No" =====
    function startNo() {
      state = 'running-no';
      renderBtns();
      bgMusic.play();

      let idx = 0;

      function showList() {
        if (isPaused) { resumeFn = showList; return; }
        sequence.style.opacity = 1;
        resumeFn = showNextLine;
        wait(1500, showNextLine);
      }

      function showNextLine() {
        if (isPaused) { resumeFn = showNextLine; return; }
        if (idx < lines.length) {
          lines[idx].style.opacity = 1;
          idx++;
          resumeFn = showNextLine;
          wait(1800, showNextLine);
        } else {
          resumeFn = doTransition;
          wait(2500, doTransition);
        }
      }

      wait(1500, () => {
        if (isPaused) { resumeFn = () => { titleRicorda.style.opacity = 1; wait(1200, showList); }; return; }
        titleRicorda.style.opacity = 1;
        resumeFn = showList;
        wait(1200, showList);
      });

      function doTransition() {
        if (isPaused) { resumeFn = doTransition; return; }
        sequence.style.opacity = 0;
        titleRicorda.style.opacity = 0;
        resumeFn = showCountdown;
        wait(1500, showCountdown);
      }
    }

    // ===== TIMER =====
    const target = new Date("2026-06-04T17:00:00").getTime();
    setInterval(() => {
      const diff = target - Date.now();
      if (diff <= 0) return;
      document.getElementById('days').innerText = Math.floor(diff / 86400000);
      document.getElementById('hours').innerText = Math.floor(diff / 3600000) % 24;
      document.getElementById('minutes').innerText = Math.floor(diff / 60000) % 60;
      document.getElementById('seconds').innerText = Math.floor(diff / 1000) % 60;
    }, 1000);
  </script>
</body>

</html>
