<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Andrea e Cristina 04.06.2026</title>

<link rel="icon" type="image/png"
    href="https://raw.githubusercontent.com/andreaecristina2023/Matrimonio/main/images/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Kaushan+Script&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{font-family:'Kaushan Script',cursive;width:100%;height:100%;overflow-x:hidden;}
body::before{
    content:"";position:fixed;inset:0;
    background:linear-gradient(rgba(0,0,0,0.35),rgba(0,0,0,0.35)),
    url('https://raw.githubusercontent.com/andreaecristina2023/Matrimonio/main/images/background.jpg') center/cover no-repeat;
    z-index:-1;
}
.central-wrapper{display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;height:calc(100vh - var(--nav-height));}
.central-container{display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;}
#map-container{width:90%;max-width:1000px;aspect-ratio:16/9;display:flex;justify-content:center;align-items:center;}
#map{width:100%;height:100%;border-radius:15px;}

.marker-number div,.marker-special div,.marker-municipio div{
    display:flex;align-items:center;justify-content:center;border-radius:50%;width:100%;height:100%;text-align:center;font-size:2em;color:white;font-family:'Kaushan Script',cursive;
}

.marker-number div{background:#8e24aa;}
.marker-special div{background:#ff0000;}
.marker-municipio div{background:#4caf50;}

.leaflet-popup-content{font-family:'Kaushan Script',cursive !important;font-size:1.1rem;text-align:left;min-width:220px;}
.leaflet-popup-content a{color:#0000ff;text-decoration:none;font-weight:bold;}
.leaflet-popup-content a:hover{text-decoration:underline;}
.leaflet-popup-content-wrapper{background:transparent;border-radius:10px;padding:0 !important;border:2px solid transparent;}
.leaflet-popup-tip{background:transparent;color:transparent;}

#locateBtn{position:absolute;top:10px;right:10px;z-index:1000;padding:8px 12px;border:none;border-radius:12px;background:#ff0000;color:white;cursor:pointer;font-family:'Kaushan Script',cursive;font-size:1rem;}
</style>
</head>

<body>
<div id="menu-placeholder"></div>

<div class="central-wrapper" id="centralWrapper">
    <div class="central-container">
        <div id="map-container">
            <div id="map"></div>
        </div>
    </div>
</div>

<button id="locateBtn" onclick="locateUser()">📍 Mi Trova</button>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
console.log("🚀 Inizio script mappa");

// ===== MAPPA =====
const CENTRO = { lat:44.15058, lon:12.141665 };
const map = L.map('map',{zoomControl:false}).setView([CENTRO.lat,CENTRO.lon],13);
L.control.zoom({position:'bottomleft'}).addTo(map);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// ===== UTILITY =====
function getIconSize(){ return Math.round(Math.min(window.innerWidth, window.innerHeight)*0.06); }
function getFontSize(size){ return Math.round(size*0.45); }

function createNumberIcon(symbol, color="#2196f3"){
    const size=getIconSize(), fontSize=getFontSize(size);
    return L.divIcon({
        className:'marker-number',
        html:`<div style="font-size:${fontSize}px;background:${color};border-radius:50%;width:${size}px;height:${size}px;display:flex;align-items:center;justify-content:center;color:white;">${symbol}</div>`,
        iconSize:[size,size],
        iconAnchor:[size/2,size/2],
        popupAnchor:[0,-size/2]
    });
}

function createSpecialIcon(symbol, color="#ff0000"){
    const size=getIconSize(), fontSize=getFontSize(size);
    return L.divIcon({
        className:'marker-special',
        html:`<div style="font-size:${fontSize}px;background:${color};border-radius:50%;width:${size}px;height:${size}px;display:flex;align-items:center;justify-content:center;color:white;">${symbol}</div>`,
        iconSize:[size,size],
        iconAnchor:[size/2,size/2],
        popupAnchor:[0,-size/2]
    });
}

// ===== CARICAMENTO TSV =====
const tsvURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQBV9faZqgv88uu4_Z790474hIu-ik9XnOOQckWEWuPeMKSQ26VQrXwGCBeFn-WLRb7nbU0sd1pqkBg/pub?gid=279539594&single=true&output=tsv";

function parseTSVtoObjects(text){
    text=text.replace(/^\uFEFF/,'');
    const lines=text.split(/\r?\n/).filter(l=>l.trim()!=='');
    const header=lines[0].split(/\t/).map(h=>h.trim());
    return lines.slice(1).map(line=>{
        const cols=line.split(/\t/);
        const obj={};
        header.forEach((h,i)=>obj[h]=cols[i]?cols[i].trim():"");
        return obj;
    });
}

const allMarkers = [];

fetch(tsvURL).then(r=>r.text()).then(text=>{
    const points=parseTSVtoObjects(text);

    // ===== CREAZIONE MARKER =====
    points.forEach(p=>{
        const lat=parseFloat(p.Latitudine), lon=parseFloat(p.Longitudine);
        if(isNaN(lat)||isNaN(lon)) return;
        const color=p.Colore||"#ff0000";
        const markerIcon = (p.Categoria==="Parcheggi") ? createNumberIcon(p.Simbolo,color) : createSpecialIcon(p.Simbolo,color);
        const popupHTML = `<div style="line-height:1.4;background:rgba(255,255,255,0.9);padding:8px;border-radius:10px;border:2px solid ${color};">
            <div style="background:white;color:${color};padding:6px 10px;border-radius:6px;margin-bottom:6px;text-align:center;width:100%;box-sizing:border-box;">
                <div style="font-size:18px;font-weight:bold;">${p.Descrizione}</div>
                ${p.Indirizzo?`<div style="font-size:14px;margin-top:4px;color:#555;">📍 ${p.Indirizzo}</div>`:""}
            </div>
            ${p.Telefono?`<div style="color:#555;">📞 Telefono: <a href="tel:${p.Telefono}" style="color:${color};text-decoration:none;">${p.Telefono}</a></div>`:""}
            ${p["Posti auto"]?`<div style="color:#555;">🅿️ Posti: ${p["Posti auto"]}</div>`:""}
            ${p.Accessibilità?`<div style="color:#555;">♿ Accessibilità: ${p.Accessibilità}</div>`:""}
            ${p.Link?`<div style="color:#555;">🌐 Sito Web: <a href="${p.Link}" target="_blank" style="color:${color};text-decoration:underline;">Link</a></div>`:""}
        </div>`;
        const marker=L.marker([lat,lon],{icon:markerIcon});
        marker.category=p.Categoria||"Altro";
        marker.bindPopup(popupHTML).addTo(map);
        allMarkers.push(marker);
    });

    // ===== LEGENDA =====
    const categories=[...new Set(points.map(p=>p.Categoria).filter(c=>c))];
    const legendControl=L.control({position:'topright'});
    legendControl.onAdd=function(){
        const wrapper=L.DomUtil.create('div');
        L.DomEvent.disableClickPropagation(wrapper);
        L.DomEvent.disableScrollPropagation(wrapper);

        const container=L.DomUtil.create('div','legend-container',wrapper);
        const toggleBtn=L.DomUtil.create('button','legend-toggle',container);
        toggleBtn.innerHTML="☰ Legenda";
        const legendDiv=L.DomUtil.create('div','info legend',container);
        const legendContent=document.createElement('div');
        legendContent.className='legend-content';
        legendDiv.appendChild(legendContent);

        categories.forEach(cat=>{
            const color=points.find(p=>p.Categoria===cat)?.Colore||"#ff0000";
            const row=document.createElement('div');
            row.className='legend-row';
            const checkbox=document.createElement('input');
            checkbox.type='checkbox';
            checkbox.checked=true;
            checkbox.id="chk_"+cat.replace(/\s/g,'');
            const colorCircle=document.createElement('span');
            colorCircle.style.display='inline-block';
            colorCircle.style.width='12px'; colorCircle.style.height='12px';
            colorCircle.style.borderRadius='50%'; colorCircle.style.backgroundColor=color; colorCircle.style.marginRight='8px';
            const label=document.createElement('label');
            label.setAttribute('for',checkbox.id); label.innerText=cat;
            row.appendChild(checkbox); row.appendChild(colorCircle); row.appendChild(label);
            legendContent.appendChild(row);

            row.addEventListener('click',e=>{
                if(e.target!==checkbox) checkbox.checked=!checkbox.checked;
                updateMarkers(cat,checkbox.checked);
            });
            checkbox.addEventListener('change',()=>updateMarkers(cat,checkbox.checked));
        });

        function updateMarkers(cat,visible){
            allMarkers.forEach(m=>{if(m.category===cat) visible? m.addTo(map): map.removeLayer(m);});
        }

        toggleBtn.addEventListener('click',()=>{
            legendDiv.classList.toggle('legend-show');
            toggleBtn.classList.toggle('legend-open');
        });

        function updateLegend(){
            if(window.innerWidth>768){ legendDiv.classList.add('legend-show'); toggleBtn.classList.add('legend-open'); }
            else{ legendDiv.classList.remove('legend-show'); toggleBtn.classList.remove('legend-open'); }
        }
        updateLegend();
        window.addEventListener("resize",updateLegend);

        return wrapper;
    };
    legendControl.addTo(map);
});

// ===== LOCALIZZAZIONE =====
function locateUser(){ map.locate({setView:true,maxZoom:16}); }
map.on('locationfound',e=>{ L.marker(e.latlng).addTo(map).bindPopup("Sei qui").openPopup(); });

// ===== RIDIMENSIONAMENTO DINAMICO =====
window.addEventListener('resize',()=>{ allMarkers.forEach(m=>{
    const html=m.options?.icon?.options?.html?.match(/<div>(.*)<\/div>/)?.[1]||"";
    if(m.options?.icon?.options?.className==="marker-number") m.setIcon(createNumberIcon(html));
    else if(m.options?.icon?.options?.className==="marker-special") m.setIcon(createSpecialIcon(html));
}); });
</script>
</body>
</html>
